<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body class="bg-indigo-700 min-h-screen flex justify-center items-center">
		<div
			class="container bg-white rounded-xl w-100 h-150 p-10 flex flex-col items-center justify-around"
		>
			<h2 class="text-gray-800 font-bold text-4xl">Login</h2>
			<form
				action=""
				id="form-login"
				class="flex flex-col w-full h-4/6"
				novalidate
			>
				<input
					type="email"
					name="email"
					id="email"
					placeholder="Email"
					required
					class="bg-gray-100 rounded-full py-2 px-4 my-3"
				/>
				<input
					type="password"
					name="password"
					id="password"
					required
					placeholder="Password"
					class="bg-gray-100 rounded-full py-2 px-4 my-3"
				/>
				<div>
					<input
						type="checkbox"
						name="remember"
						id="remember"
						class="accent-orange-500"
					/>
					<label for="remember">Remember me</label>
				</div>
				<button
					type="submit"
					class="bg-gradient-to-r from-orange-400 to-orange-300 hover:bg-orange-800 text-white font-bold py-2 px-4 rounded-full my-4 cursor-pointer"
				>
					LOG IN
				</button>
				<a href="" class="self-center">Forget Password</a>
			</form>
			<p>Vitalvet</p>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="../js/auth.js"></script>
	</body>
</html>
